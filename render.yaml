# Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mern-mastery-academy
    runtime: node
    region: singapore          # closest to India — change to 'ohio' for US East
    plan: free                 # upgrade to 'starter' for always-on (no sleep)

    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node server.js

    healthCheckPath: /api/questions?domain=html&level=1

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false            # set manually in Render dashboard — never commit
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure random value
      - key: FRONTEND_URL
        sync: false            # set to your Render app URL e.g. https://mern-mastery-academy.onrender.com
      - key: APP_URL
        sync: false            # same as FRONTEND_URL if single-service deploy
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
